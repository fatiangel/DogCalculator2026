<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>妙麗(柯基犬)歲數計算機</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>妙麗(柯基犬)歲數計算機</h1>

      <h3>公式來源說明:</h3>
      <p>
        Wang, T. et al. (2019). Quantitative translation of dog-to-human aging
        by conserved remodeling of epigenetic networks. Cell Systems. DOI:
        https://doi.org/10.1016/j.cels.2019.11.002
      </p>

      <p>公式：HumanAge = 16 × ln(DogAge) + 31</p>

      <hr />

      <label>輸入妙麗出生年月日:</label>

      <input type="date" id="birthDatey" value="2023-02-28" />

      <div class="buttons">
        <button id="calcBtn" type="button">開始計算</button>
        <button id="clearBtn" type="button">清除</button>
      </div>

      <div id="result" class="result"></div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
