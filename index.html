<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>妙麗(柯基犬)歲數計算機</title>
    <link rel="stylesheet" href="style.css" />
    <script link="preload" src="app.js"></script>
  </head>

  <body>
    <h1>妙麗(柯基犬)歲數計算機</h1>

    <h3>公式來源說明:</h3>
    <p>
      Wang, T. et al. (2020). Quantitative Translation of Dog-to-Human Aging by
      Conserved Remodeling of the DNA Methylome. Cell Systems.
      DOI:10.1016/j.cels.2020.06.006
    </p>

    <p>使用公式：human_age = 16 × ln(dog_age) + 31</p>

    <hr />

    <label>輸入妙麗出生年月日:</label>
    <input type="date" id="birthDate" value="2023-02-28" />

    <br /><br />

    <button id="calcBtn">開始計算</button>
    <button id="clearBtn">清除</button>

    <hr />

    <div id="result">
      <p>狗的年齡是：-</p>
      <p>換算人類的年齡是：-</p>
      <p>公式簡述：使用 Cell Systems (2020) DNA methylation 年齡模型。</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
